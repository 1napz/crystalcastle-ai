name: Auto Create Pull Request

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
      - 'hotfix/*'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Run Tests
        run: |
          pip install -r requirements.txt
          pytest --maxfail=1 --disable-warnings -q

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto PR after commit"
          title: "Auto PR - Commit Trigger"
          body: |
            ✅ Auto-generated PR after commit
            - Triggered by push to ${{ github.ref_name }}
            - Governance checks passed
            ---
            📋 รายงานภาษาไทย:
            - ผ่าน CI/CD checks
            - รวม config ตาม Governance Flow
          branch: auto/pr-${{ github.sha }}
