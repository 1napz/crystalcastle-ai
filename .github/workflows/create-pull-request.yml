name: Auto Create Pull Request

on:
  push:
    branches:
      - main   # trigger ทุกครั้งที่ commit เข้า main

permissions:
  contents: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto PR after commit"
          title: "Auto PR - Commit Trigger"
          body: |
            ✅ Pull Request สร้างอัตโนมัติหลัง commit
            - Triggered by push to main
          branch: auto/commit-pr
