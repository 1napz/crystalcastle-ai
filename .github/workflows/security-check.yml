### 📄 เนื้อหาไฟล์ `.github/workflows/gitignore-monitor.yml`
*(ระบบบันทึก Log และแจ้งเตือนเมื่อมีการแก้ไขโครงสร้างการ Ignore ไฟล์)*

```yaml
name: 🚨 Gitignore Change Monitor & Alert

on:
  push:
    paths:
      - '.gitignore' # ทำงานเฉพาะเมื่อไฟล์ .gitignore ถูกแก้ไขเท่านั้น

jobs:
  audit-and-alert:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # ดึงประวัติย้อนหลัง 2 Commit เพื่อดูความเปลี่ยนแปลง

      - name: 📝 Generate Action Logging (Diff)
        id: git_diff
        run: |
          echo "==== GITIGNORE CHANGE LOG ====" > change_log.txt
          echo "Author: ${{ github.actor }}" >> change_log.txt
          echo "Commit: ${{ github.sha }}" >> change_log.txt
          echo "Date: $(date +'%Y-%m-%d %H:%M:%S')" >> change_log.txt
          echo "------------------------" >> change_log.txt
          git diff HEAD^ HEAD .gitignore >> change_log.txt
          echo "========================" >> change_log.txt
          
          cat change_log.txt
          CLEAN_DIFF=$(git diff HEAD^ HEAD .gitignore | jq -sRr @json)
          echo "diff_content=$CLEAN_DIFF" >> $GITHUB_OUTPUT

      - name: 🤖 Send Alert to Gemini Chat
        if: always()
        run: |
          curl --X POST -H 'Content-Type: application/json; charset=UTF-8' \
          "${{ secrets.GEMINI_CHAT_WEBHOOK }}" \
          -d '{
            "text": "🚨 *แจ้งเตือนการแก้ไขไฟล์ .gitignore*\n👤 *โดย:* ${{ github.actor }}\n📌 *Commit:* ${{ github.sha }}\n📝 *รายละเอียดการเปลี่ยนแปลง:* \n```\n'${{ steps.git_diff.outputs.diff_content }}'\n```"
          }'

      - name: ✉️ Send Email to Owner
        if: always()
        uses: sendgrid/sendgrid-action@v1
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        with:
          mail_to: 'owner@example.com'
          mail_from: 'alerts@yourdomain.com'
          mail_subject: '🚨 Alert: .gitignore has been modified by ${{ github.actor }}'
          mail_text: |
            มีระบบตรวจพบการแก้ไขไฟล์ .gitignore ในโปรเจกต์ของคุณ
            รายละเอียดการตรวจสอบอยู่ที่ลิงก์: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
```

