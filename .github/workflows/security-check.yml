```yaml
name: 🚨 Security & Env Leak Check

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  leak-detection:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ดึงประวัติทั้งหมดมาตรวจ

      - name: 🔍 Check for .env.local leak
        run: |
          if git ls-files | grep -E ".env.local$|.env$"; then
            echo "❌ ERROR: พบไฟล์ความลับ หลุดขึ้นมาบนระบบ Git!"
            echo "กรุณารันคำสั่ง 'git rm --cached .env.local' ในเครื่องของคุณ แล้วใช้วิธีสลับ .gitignore ก่อน Push"
            exit 1
          else
            echo "✅ 不พบไฟล์ .env หลุดรอด ระบบปลอดภัย!"
          fi

      - name: 🔒 Verify Active Gitignore Mode
        run: |
          if grep -q "🚨 SECURITY" .gitignore; then
            echo "🟢 ยืนยัน: ปัจจุบันระบบใช้ .gitignore โหมด Secure อยู่"
          else
            echo "⚠️ คำเตือน: ปัจจุบันระบบเปิดโหมด Dev ไว้ แต่ไม่มีไฟล์ลับหลุดขึ้นมา (ผ่านครึ่งทาง)"
          fi
```

