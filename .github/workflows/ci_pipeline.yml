# .github/workflows/ci_pipeline.yml
name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest-xdist pytest-cov
      - run: pytest -m unit -n auto --cov=src --cov-report=xml --cov-fail-under=90

  integration-tests:
    if: contains(github.event.pull_request.labels.*.name, 'integration')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest-xdist pytest-cov
      - run: pytest -m integration -n auto --cov=src --cov-report=xml --cov-fail-under=80
