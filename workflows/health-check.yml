# .github/workflows/health-check.yml
name: Health Check API

on:
  schedule:
    - cron: '*/30 * * * *'  # ทุก 30 นาที
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check API health
        id: api-check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://crystalcastle-pi.vercel.app/api/health)
          if [ "$response" -eq 200 ]; then
            echo "✅ API is healthy"
            echo "status=healthy" >> $GITHUB_OUTPUT
          else
            echo "❌ API returned $response"
            echo "status=unhealthy" >> $GITHUB_OUTPUT
          fi

      - name: Log result to file
        run: |
          mkdir -p docs/health
          DATE=$(date +%Y%m%d_%H%M)
          STATUS=${{ steps.api-check.outputs.status }}
          FILE="docs/health/${DATE}_Health_${STATUS}.md"

          echo "# Health Check Result" > $FILE
          echo "- Timestamp: $(date)" >> $FILE
          echo "- Status: $STATUS" >> $FILE

      - name: Commit log file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/health/*.md
          git commit -m "Add health check log at $(date +%Y-%m-%d_%H:%M)"
          git push

      - name: Send alert on failure
        if: steps.api-check.outputs.status == 'unhealthy'
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"text":"🚨 Crystal Castle API is down!"}' \
            ${{ secrets.SLACK_WEBHOOK }}

      - name: Open GitHub Issue on failure
        if: steps.api-check.outputs.status == 'unhealthy'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "API Health Check Failed",
              body: "The API returned status ${{ steps.api-check.outputs.status }}.\n\nSuggested Fixes:\n- Check server uptime\n- Validate endpoint response\n- Review deployment logs"
            })